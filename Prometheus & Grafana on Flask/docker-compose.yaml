# описание всех компонентов и автоматизация запуска

services:
  app:
    # сборка фласк контейнера из локального докерфайла
    build: .
    ports:
      - "8000:8000"
    # сначала создаем таблицы одним потоком, потом запускаем 
    command: >
      sh -c "python -c \"from app import create_app, db; a=create_app(); a.app_context().push(); db.create_all()\" && 
             gunicorn -w 2 -b 0.0.0.0:8000 --access-logfile - wsgi:app"
    # переменные окружения для подключения
    environment: 
      DATABASE_URL: postgresql+psycopg2://flask:flask@db:5432/flaskdb
      REDIS_URL: redis://redis:6379/0
      TASKS_CACHE_TTL: 60
    # старт после базы
    depends_on:
      db:
        condition: service_healthy # Теперь ждем реальной готовности
      redis:
        condition: service_started
  
  db:
    # минимальный официальный постгрес образ
    image: postgres:16-alpine
    # инициализация учетки и базы
    environment:
      POSTGRES_USER: flask
      POSTGRES_PASSWORD: flask
      POSTGRES_DB: flaskdb
    # сохранение данных 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # проверка готовности базы принимать подключения
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flask -d flaskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    # для кеша апи ответов
    image: redis:7-alpine

  nginx:
    # проксирует запрос к flask
    image: nginx:1.27-alpine
    # внешний порт
    ports:
      - "80:80"
    # монтируем конфиг и папку кеша
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
    # перед стартом ожидание приложения
    depends_on:
      - app


# далее под 6 задание
  
  # экспортер
  node_exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    ports:
      - "9100:9100"

  # экспортер nginx
  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    command:
      - '-nginx.scrape-uri=http://nginx/nginx_status'
    depends_on:
      - nginx
    ports:
      - "9113:9113"

  # экспортер базки
  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgresql://flask:flask@db:5432/flaskdb?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9187:9187"

  # экспортер прометеуса
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
      - node_exporter
      - nginx_exporter
      - postgres_exporter

  # экспортер графана
  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      
# ну и неймы томов 
volumes:
  postgres_data:
  nginx_cache:
  prometheus_data:
  grafana_data: