apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sma1kyyy/DevOps.git
    targetRevision: master
    path: k3s/charts/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: flask-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
