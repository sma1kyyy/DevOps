apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-stack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: docker.io/sma1kyyy/flask-k3s:latest
          envFrom:
            - secretRef:
                name: flask-secrets
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app
  namespace: flask-stack
spec:
  selector:
    app: flask-app
  ports:
    - port: 80
      targetPort: 80
